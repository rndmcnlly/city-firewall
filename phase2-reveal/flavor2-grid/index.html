<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shatter Reveal — Grid Collapse</title>
<style>
  /* =========================================================================
     Classic Heist visual style guide (shared across all three flavors).
     Near-black bg, dark panels, red accent. Monospace = terminal/code.
     ========================================================================= */
  :root {
    --bg:      #0a0e14;
    --panel:   #121822;
    --border:  #1d2735;
    --ink:     #e6edf3;
    --dim:     #8b98a5;
    --accent:  #ff4d4d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: ui-sans-serif, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  /* The WebGL canvas fills the viewport and sits on TOP of the DOM desktop. */
  #gl {
    position: fixed; inset: 0; z-index: 10;
    display: block; width: 100%; height: 100%;
  }

  /* -------------------------------------------------------------------------
     The "secure desktop" behind the glass. This is plain DOM, sitting BEHIND
     the WebGL canvas. As the grid collapses we let the 3D scene's clear color
     go transparent so this shows through. Placeholder per spec.
     ------------------------------------------------------------------------- */
  #desktop {
    position: fixed; inset: 0; z-index: 1;
    background:
      radial-gradient(1200px 800px at 70% 20%, #14202c 0%, #0b1117 60%, #070a0f 100%);
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  }
  /* faint grid wallpaper to read as a "secure" workstation */
  #desktop::before {
    content: ""; position: absolute; inset: 0; opacity: 0.12;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 34px;
    background: rgba(18,24,34,0.9); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 14px;
    font-size: 13px; color: var(--dim); letter-spacing: 0.5px;
  }
  .topbar .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
    margin-right: 8px; box-shadow: 0 0 8px var(--accent); }
  .desktop-icon {
    position: absolute; top: 90px; left: 60px; width: 96px;
    text-align: center; cursor: pointer; user-select: none;
    color: var(--ink); font-size: 13px;
  }
  .desktop-icon .glyph {
    width: 64px; height: 64px; margin: 0 auto 8px;
    border: 1px solid var(--border); border-radius: 8px;
    background: linear-gradient(160deg, #18222e, #0f1620);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; color: var(--accent);
    box-shadow: 0 4px 14px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,77,77,0.08);
  }
  .desktop-icon:hover .glyph { box-shadow: 0 0 16px rgba(255,77,77,0.4); }

  /* The clue.txt window */
  #clueWindow {
    position: absolute; top: 140px; left: 220px; width: 320px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.6); display: none; z-index: 5;
  }
  #clueWindow .title {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--dim);
  }
  #clueWindow .title .close {
    cursor: pointer; color: var(--dim); padding: 0 4px;
  }
  #clueWindow .title .close:hover { color: var(--accent); }
  #clueWindow .body {
    padding: 22px 18px; font-family: ui-monospace, Menlo, monospace;
  }
  #clueWindow .code {
    font-size: 40px; letter-spacing: 10px; color: var(--accent);
    text-shadow: 0 0 12px rgba(255,77,77,0.5); text-align: center;
  }
  #clueWindow .caption { color: var(--dim); font-size: 11px; text-align: center; margin-top: 10px; }

  /* Replay button overlay, always clickable, above everything. */
  #replay {
    position: fixed; z-index: 20; right: 16px; bottom: 16px;
    background: var(--panel); color: var(--ink);
    border: 1px solid var(--accent); border-radius: 6px;
    padding: 9px 16px; font-size: 13px; cursor: pointer;
    font-family: ui-monospace, Menlo, monospace; letter-spacing: 1px;
    box-shadow: 0 0 14px rgba(255,77,77,0.25);
  }
  #replay:hover { background: #1a222e; box-shadow: 0 0 20px rgba(255,77,77,0.5); }
</style>
</head>
<body>

  <!-- =======================================================================
       SECURE DESKTOP (DOM, behind WebGL). Revealed once the grid collapses.
       ======================================================================= -->
  <div id="desktop">
    <div class="topbar"><span class="dot"></span> SECURE WORKSTATION // node-07 :: access granted</div>

    <div class="desktop-icon" id="clueIcon">
      <div class="glyph">&#128196;</div>
      <div>clue.txt</div>
    </div>

    <div id="clueWindow">
      <div class="title">
        <span>clue.txt — /home/agent</span>
        <span class="close" id="clueClose">&#10005;</span>
      </div>
      <div class="body">
        <div class="code">WXYZ</div>
        <div class="caption">// placeholder clue — real code injected later</div>
      </div>
    </div>
  </div>

  <!-- WebGL canvas: the "glass" (login screen) that shatters as a tile grid. -->
  <canvas id="gl"></canvas>

  <button id="replay">&#9654; REPLAY</button>

  <!-- =======================================================================
       Import map: pin a specific Three.js version from jsDelivr.
       Only the core module is actually imported; the addons path is mapped
       defensively in case the synthesis step wants jsm helpers later.
       ======================================================================= -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';

  /* =========================================================================
     GRID COLLAPSE flavor
     -------------------------------------------------------------------------
     The login screen is drawn onto a 2D <canvas> and used as a CanvasTexture.
     We slice the textured plane into a clean rectangular grid of tiles. Each
     tile gets procedurally-computed UVs so, at rest, the tiles reconstruct the
     login image seamlessly. On trigger, tiles fall away in a diagonal domino
     cascade: a wave sweeping from the top-left corner to the bottom-right,
     each tile flipping backward about its bottom edge while gravity pulls it
     down and it recedes in z. Thin glowing red edges fade in as each tile
     breaks free, for a Tron / circuit-board feel.
     ========================================================================= */

  // ---- Grid resolution. 10 columns x 7 rows = 70 tiles (crisp, rhythmic). ----
  const COLS = 10;
  const ROWS = 7;

  // ---- Login texture authoring resolution (the canvas we draw the UI on). ----
  const TEX_W = 1024;
  const TEX_H = 720;     // ~ matches a landscape login viewport

  // =========================================================================
  // 1) DRAW THE LOGIN SCREEN ONTO A 2D CANVAS  -> CanvasTexture
  //    `withFlash` lets us redraw with a bright red grid-line flash overlaid,
  //    used in the instant before the collapse begins.
  // =========================================================================
  const loginCanvas = document.createElement('canvas');
  loginCanvas.width = TEX_W;
  loginCanvas.height = TEX_H;
  const lctx = loginCanvas.getContext('2d');

  // Progressive "scorch" cuts carved by the lasers. Each entry is a grid line
  // that has already been sliced; we redraw them every frame so the cuts
  // persist on the texture as the lasers assemble the grid one line at a time.
  //   { axis: 'v'|'h', pos: 0..1 along the cross-axis, t: 0..1 reveal progress }
  const cuts = [];

  function drawLogin() {
    const ctx = lctx;
    const W = TEX_W, H = TEX_H;

    // Background
    ctx.fillStyle = '#0a0e14';
    ctx.fillRect(0, 0, W, H);

    // Subtle ambient vignette
    const vg = ctx.createRadialGradient(W/2, H*0.35, 80, W/2, H/2, W*0.7);
    vg.addColorStop(0, 'rgba(20,32,44,0.55)');
    vg.addColorStop(1, 'rgba(7,10,15,0)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    // ---- Login card ----
    const cardW = 520, cardH = 380;
    const cx = (W - cardW) / 2, cy = (H - cardH) / 2;

    // card shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 40; ctx.shadowOffsetY = 18;
    roundRect(ctx, cx, cy, cardW, cardH, 14);
    ctx.fillStyle = '#121822';
    ctx.fill();
    ctx.restore();

    // card border
    roundRect(ctx, cx, cy, cardW, cardH, 14);
    ctx.lineWidth = 2; ctx.strokeStyle = '#1d2735'; ctx.stroke();

    // Title
    ctx.fillStyle = '#e6edf3';
    ctx.font = '600 30px ui-sans-serif, system-ui, Helvetica, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('SECURE ACCESS', W/2, cy + 60);

    // accent underline
    ctx.fillStyle = '#ff4d4d';
    ctx.fillRect(W/2 - 70, cy + 76, 140, 3);

    // Sub label
    ctx.fillStyle = '#8b98a5';
    ctx.font = '14px ui-monospace, Menlo, Consolas, monospace';
    ctx.fillText('// authorized personnel only', W/2, cy + 102);

    // ---- Fields (fake/static) ----
    const fieldX = cx + 50, fieldW = cardW - 100, fieldH = 46;
    drawField(ctx, fieldX, cy + 132, fieldW, fieldH, 'USERNAME', 'agent_07');
    drawField(ctx, fieldX, cy + 200, fieldW, fieldH, 'PASSWORD', '••••••••••••');

    // ---- "ACCESS DENIED" stamp (rotated, red, distressed feel) ----
    ctx.save();
    ctx.translate(W/2, cy + 300);
    ctx.rotate(-0.18);
    ctx.strokeStyle = '#ff4d4d';
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.92;
    roundRect(ctx, -150, -34, 300, 68, 8);
    ctx.stroke();
    ctx.fillStyle = '#ff4d4d';
    ctx.font = '700 34px ui-monospace, Menlo, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ACCESS DENIED', 0, 2);
    ctx.restore();
    ctx.textBaseline = 'alphabetic';

    // ---- Progressive laser cuts: glowing scorched grid lines, drawn up to
    //      each cut's current reveal length so we can watch the beam carve it.
    //      A cut is a hot red line with a white-hot core and a soft glow.
    for (const cut of cuts) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.shadowColor = '#ff4d4d';
      ctx.shadowBlur = 16;
      if (cut.axis === 'v') {
        const x = cut.pos * W;
        const y1 = 0, y2 = H * cut.t;          // grow downward as it cuts
        // outer glow
        ctx.strokeStyle = 'rgba(255,77,77,0.85)';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
        // white-hot core
        ctx.shadowBlur = 6;
        ctx.strokeStyle = 'rgba(255,235,235,0.95)';
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
      } else {
        const y = cut.pos * H;
        const x1 = 0, x2 = W * cut.t;          // grow rightward as it cuts
        ctx.strokeStyle = 'rgba(255,77,77,0.85)';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
        ctx.shadowBlur = 6;
        ctx.strokeStyle = 'rgba(255,235,235,0.95)';
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
      }
      ctx.restore();
    }
  }

  // Helper: rounded rectangle path
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
  }

  // Helper: a labeled input field
  function drawField(ctx, x, y, w, h, label, value) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#8b98a5';
    ctx.font = '11px ui-monospace, Menlo, monospace';
    ctx.fillText(label, x, y - 8);
    roundRect(ctx, x, y, w, h, 6);
    ctx.fillStyle = '#0a0e14';
    ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = '#1d2735'; ctx.stroke();
    ctx.fillStyle = '#e6edf3';
    ctx.font = '17px ui-monospace, Menlo, monospace';
    ctx.fillText(value, x + 14, y + h/2 + 6);
  }

  drawLogin();
  const loginTexture = new THREE.CanvasTexture(loginCanvas);
  loginTexture.colorSpace = THREE.SRGBColorSpace;
  loginTexture.minFilter = THREE.LinearFilter;   // no mipmaps: avoid edge bleed
  loginTexture.generateMipmaps = false;

  // =========================================================================
  // 2) THREE.JS SCENE SETUP
  // =========================================================================
  const canvas = document.getElementById('gl');
  const renderer = new THREE.WebGLRenderer({
    canvas, antialias: true, alpha: true   // alpha so the DOM desktop shows through
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);       // fully transparent clear

  const scene = new THREE.Scene();

  // Orthographic-ish framing via a perspective camera positioned so the plane
  // fills the view. We compute the world width/height the plane should span
  // and place the camera at a distance where it fits the viewport.
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.set(0, 0, 10);
  camera.lookAt(0, 0, 0);

  // Lighting: a key light + ambient so the flipping tiles catch highlights and
  // their back faces fall into shadow as they tumble (gives the 3D depth read).
  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const key = new THREE.DirectionalLight(0xffffff, 1.1);
  key.position.set(2, 3, 6);
  scene.add(key);
  // faint red rim light for the heist mood
  const rim = new THREE.DirectionalLight(0xff4d4d, 0.4);
  rim.position.set(-4, -2, 3);
  scene.add(rim);

  // =========================================================================
  //   LASER BEAM (overlaid in front of the plane). A single bright beam we
  //   reposition to sweep across the screen and "cut" each grid line. It has
  //   a glowing line body plus a hot leading-edge dot. Hidden when not slicing.
  // =========================================================================
  const laserGroup = new THREE.Group();
  laserGroup.visible = false;
  scene.add(laserGroup);

  // Beam body: a thin additive plane we stretch/rotate per cut.
  const beamMat = new THREE.MeshBasicMaterial({
    color: 0xff5a5a, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthTest: false, side: THREE.DoubleSide
  });
  const beamMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), beamMat);
  beamMesh.renderOrder = 5;
  laserGroup.add(beamMesh);

  // White-hot leading dot: where the laser is actively burning.
  const sparkMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 1.0,
    blending: THREE.AdditiveBlending, depthTest: false
  });
  const spark = new THREE.Mesh(new THREE.CircleGeometry(0.14, 16), sparkMat);
  spark.renderOrder = 6;
  laserGroup.add(spark);

  const BEAM_Z = 0.05;     // just in front of the tile plane (z=0)

  // ---- Compute the plane's world dimensions to match the login aspect ratio
  //      and (re)fit the camera on resize. We keep a fixed world height and
  //      derive width from the texture aspect.
  const PLANE_H = 6;                         // world units tall
  const PLANE_W = PLANE_H * (TEX_W / TEX_H); // preserve login aspect ratio

  // =========================================================================
  // 3) BUILD THE TILE GRID
  //    One small PlaneGeometry per tile. Each tile is parented to a pivot
  //    Object3D placed at the tile's BOTTOM edge, so rotating the pivot about
  //    X flips the tile backward like a falling domino. UVs are set so each
  //    tile samples exactly its slice of the login texture -> seamless at rest.
  // =========================================================================
  const tileW = PLANE_W / COLS;
  const tileH = PLANE_H / ROWS;

  // Shared material settings; each tile gets its own material instance so we
  // can fade individual tiles (opacity) independently late in their fall.
  function makeTileMaterial() {
    return new THREE.MeshStandardMaterial({
      map: loginTexture,
      roughness: 0.55,
      metalness: 0.15,
      side: THREE.DoubleSide,    // see the back of tiles as they flip
      transparent: true,
      opacity: 1.0
    });
  }

  const tiles = [];   // each: { pivot, mesh, edges, col, row, delay, ... }
  const gridGroup = new THREE.Group();
  scene.add(gridGroup);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // Tile geometry centered at origin; we offset via the pivot/mesh.
      const geo = new THREE.PlaneGeometry(tileW, tileH);

      // ---- Procedural UVs: map this tile to its slice of the texture. ----
      // PlaneGeometry default UVs run 0..1 across the quad. We remap to the
      // sub-rectangle [u0..u1] x [v0..v1]. Note texture V is bottom-up, and
      // our row index r counts from the TOP, so flip vertically.
      const u0 = c / COLS, u1 = (c + 1) / COLS;
      const vTop = 1 - r / ROWS;             // top edge of this row in UV space
      const vBot = 1 - (r + 1) / ROWS;       // bottom edge
      const uv = geo.attributes.uv;
      // PlaneGeometry vertex order: 0=TL, 1=TR, 2=BL, 3=BR
      uv.setXY(0, u0, vTop);
      uv.setXY(1, u1, vTop);
      uv.setXY(2, u0, vBot);
      uv.setXY(3, u1, vBot);
      uv.needsUpdate = true;

      const mat = makeTileMaterial();
      const mesh = new THREE.Mesh(geo, mat);

      // World position of this tile's CENTER (grid centered on origin).
      const cxw = -PLANE_W/2 + (c + 0.5) * tileW;
      const cyw =  PLANE_H/2 - (r + 0.5) * tileH;

      // Pivot at the tile's BOTTOM edge so rotation.x tumbles it backward.
      const pivot = new THREE.Object3D();
      pivot.position.set(cxw, cyw - tileH/2, 0);
      // Mesh sits half a tile ABOVE the pivot so its geometry spans correctly.
      mesh.position.set(0, tileH/2, 0);
      pivot.add(mesh);
      gridGroup.add(pivot);

      // ---- Glowing red edge outline (Tron circuit feel). Hidden at rest,
      //      fades in as the tile separates. EdgesGeometry on the tile quad.
      const edgeGeo = new THREE.EdgesGeometry(geo);
      const edgeMat = new THREE.LineBasicMaterial({
        color: 0xff4d4d, transparent: true, opacity: 0.0
      });
      const edges = new THREE.LineSegments(edgeGeo, edgeMat);
      edges.position.copy(mesh.position);
      pivot.add(edges);

      // ---- Diagonal cascade timing. Stagger by (col+row): the wave sweeps
      //      from the top-left corner (0,0) toward bottom-right. Normalized
      //      so the last tile starts near the end of the stagger window.
      const diag = (c + r) / (COLS + ROWS - 2);   // 0..1 across the diagonal
      const STAGGER_WINDOW = 0.45;                 // seconds spread of the wave
      const delay = diag * STAGGER_WINDOW;

      tiles.push({
        pivot, mesh, mat, edges, edgeMat,
        col: c, row: r, delay,
        // small per-tile randomization keeps it organic but still orderly
        spin: (Math.random() - 0.5) * 1.2,        // slight z-tumble
        drift: (Math.random() - 0.5) * 0.8,       // slight sideways drift
        homePos: pivot.position.clone(),
      });
    }
  }

  // =========================================================================
  // 4) ANIMATION STATE MACHINE
  //    phases: 'idle' (login shown) -> 'slicing' (lasers carve the grid line
  //    by line) -> 'collapse' (tiles peel away) -> 'done' (revealed).
  //    Replay resets everything.
  // =========================================================================
  let phase = 'idle';
  let phaseStart = 0;           // performance.now() ms at phase entry
  const AUTO_TRIGGER_MS = 600;  // ~0.6s before the lasers start
  const SLICE_MS = 115;         // time for the laser to traverse one line
  const SLICE_GAP_MS = 35;      // brief pause between cuts
  const GRAVITY = 19;           // world units / s^2
  const FALL_DURATION = 0.8;    // seconds per tile from break to faded out

  // ---- Build the ordered list of cuts the lasers will perform. We alternate
  //      vertical and horizontal so the beam visibly jumps orientation, and
  //      sweep verticals left->right then horizontals top->bottom, interleaved
  //      for a lively "assembling the grid" rhythm.
  function buildCutSchedule() {
    const verticals = [];
    for (let c = 1; c < COLS; c++) verticals.push({ axis: 'v', pos: c / COLS });
    const horizontals = [];
    for (let r = 1; r < ROWS; r++) horizontals.push({ axis: 'h', pos: r / ROWS });
    // Interleave: V, H, V, H ... until both run out.
    const schedule = [];
    let i = 0, j = 0;
    while (i < verticals.length || j < horizontals.length) {
      if (i < verticals.length) schedule.push(verticals[i++]);
      if (j < horizontals.length) schedule.push(horizontals[j++]);
    }
    return schedule;
  }
  let cutSchedule = [];
  let cutIndex = 0;             // which cut the laser is currently burning

  function resetTiles() {
    for (const t of tiles) {
      t.pivot.position.copy(t.homePos);
      t.pivot.rotation.set(0, 0, 0);
      t.mesh.rotation.set(0, 0, 0);
      t.mat.opacity = 1.0;
      t.edgeMat.opacity = 0.0;
      t.vy = 0; t.started = false; t.tElapsed = 0;
    }
  }

  function startSequence() {
    cuts.length = 0;                 // clear any scorched lines
    cutSchedule = buildCutSchedule();
    cutIndex = 0;
    drawLogin();
    loginTexture.needsUpdate = true;
    resetTiles();
    gridGroup.visible = true;
    laserGroup.visible = false;
    canvas.style.pointerEvents = 'auto';   // canvas catches clicks again
    phase = 'idle';
    phaseStart = performance.now();
    document.getElementById('clueWindow').style.display = 'none';
  }

  // Allow clicking the glass to trigger early (per spec: "or on a click").
  canvas.addEventListener('pointerdown', () => {
    if (phase === 'idle') enterSlicing();
  });

  // ---- Position the laser beam to lie along the cut currently being burned,
  //      with its leading spark at fraction `t` along the line. Coordinates
  //      map texture-space (0..1) into the plane's world rectangle.
  function placeBeam(cut, t) {
    const halfW = PLANE_W / 2, halfH = PLANE_H / 2;
    if (cut.axis === 'v') {
      const x = -halfW + cut.pos * PLANE_W;
      const burnedLen = t * PLANE_H;             // burns from top downward
      beamMesh.position.set(x, halfH - burnedLen / 2, BEAM_Z);
      beamMesh.scale.set(0.05, burnedLen, 1);    // thin & tall
      beamMesh.rotation.z = 0;
      spark.position.set(x, halfH - burnedLen, BEAM_Z);
    } else {
      const y = halfH - cut.pos * PLANE_H;
      const burnedLen = t * PLANE_W;             // burns from left rightward
      beamMesh.position.set(-halfW + burnedLen / 2, y, BEAM_Z);
      beamMesh.scale.set(burnedLen, 0.05, 1);    // thin & wide
      beamMesh.rotation.z = 0;
      spark.position.set(-halfW + burnedLen, y, BEAM_Z);
    }
  }

  function enterSlicing() {
    phase = 'slicing';
    cutIndex = 0;
    laserGroup.visible = true;
    // begin the first cut
    cuts.push({ axis: cutSchedule[0].axis, pos: cutSchedule[0].pos, t: 0 });
    phaseStart = performance.now();
  }

  function enterCollapse() {
    laserGroup.visible = false;
    drawLogin();                      // keep the fully-carved grid on the texture
    loginTexture.needsUpdate = true;
    phase = 'collapse';
    phaseStart = performance.now();
  }

  // =========================================================================
  // 5) RESIZE / CAMERA FIT
  //    Fit the camera so PLANE_W x PLANE_H exactly fills the viewport, using
  //    "cover" semantics (fill the screen, allow slight overscan if needed).
  // =========================================================================
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;

    // Distance so the plane height fills the vertical FOV; if the viewport is
    // narrower than the plane aspect, back off so width fits too (cover).
    const vFOV = THREE.MathUtils.degToRad(camera.fov);
    const distForH = (PLANE_H / 2) / Math.tan(vFOV / 2);
    const hFOV = 2 * Math.atan(Math.tan(vFOV / 2) * camera.aspect);
    const distForW = (PLANE_W / 2) / Math.tan(hFOV / 2);
    camera.position.z = Math.max(distForH, distForW);

    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  resize();

  // =========================================================================
  // 6) MAIN LOOP
  // =========================================================================
  let lastT = performance.now();
  function animate(now) {
    requestAnimationFrame(animate);
    const dt = Math.min((now - lastT) / 1000, 0.05);  // clamp dt for stability
    lastT = now;

    if (phase === 'idle') {
      if (now - phaseStart >= AUTO_TRIGGER_MS) enterSlicing();
    } else if (phase === 'slicing') {
      // Each cut takes SLICE_MS to traverse, then a short SLICE_GAP_MS before
      // the next. Total time per cut slot = SLICE_MS + SLICE_GAP_MS.
      const SLOT = SLICE_MS + SLICE_GAP_MS;
      const sliceElapsed = now - phaseStart;
      const slot = Math.floor(sliceElapsed / SLOT);
      const within = sliceElapsed - slot * SLOT;

      // Advance the active cut index, spawning new scorch lines as we go.
      // Loop (not a single assignment) so a skipped/slow frame that jumps the
      // slot by 2+ still finalizes and spawns every intermediate cut, leaving
      // no grid line un-carved.
      while (slot > cutIndex && cutIndex < cutSchedule.length - 1) {
        if (cuts[cutIndex]) cuts[cutIndex].t = 1;   // finalize finished cut
        cutIndex++;
        cuts.push({ axis: cutSchedule[cutIndex].axis, pos: cutSchedule[cutIndex].pos, t: 0 });
      }

      // Animate the current cut's reveal fraction (ease-out for a snappy zip).
      const active = cuts[Math.min(cutIndex, cuts.length - 1)];
      if (active) {
        const raw = Math.min(within / SLICE_MS, 1);
        active.t = 1 - Math.pow(1 - raw, 2);        // ease-out
        placeBeam(cutSchedule[cutIndex], active.t);
        // spark + beam flicker for an energetic burn
        const flick = 0.75 + 0.25 * Math.sin(now * 0.05);
        beamMat.opacity = (raw < 1 ? 0.9 : 0.0) * flick;  // beam off between cuts
        sparkMat.opacity = raw < 1 ? flick : 0.0;
      }

      drawLogin();
      loginTexture.needsUpdate = true;

      // Done slicing once the last cut has fully traversed.
      if (cutIndex >= cutSchedule.length - 1 && within >= SLICE_MS) {
        if (cuts[cutIndex]) cuts[cutIndex].t = 1;
        drawLogin();
        loginTexture.needsUpdate = true;
        enterCollapse();
      }
    } else if (phase === 'collapse') {
      const tSeq = (now - phaseStart) / 1000;   // seconds since collapse began
      let anyAlive = false;

      for (const t of tiles) {
        if (tSeq < t.delay) { anyAlive = true; continue; }  // not yet released

        if (!t.started) { t.started = true; t.vy = -0.4; t.tElapsed = 0; }
        t.tElapsed += dt;

        // Edge glow: snap bright at release, then fade with the tile.
        const lifeFrac = Math.min(t.tElapsed / FALL_DURATION, 1);
        t.edgeMat.opacity = (1 - lifeFrac) * 0.9;

        // Domino flip: rotate the pivot backward about X (top edge tips away).
        const flip = Math.min(t.tElapsed * 6.4, Math.PI * 0.85);
        t.pivot.rotation.x = -flip;
        // subtle secondary tumble for organic-but-orderly motion
        t.mesh.rotation.z = t.spin * lifeFrac;

        // Gravity + slight backward (−z) recede + sideways drift.
        t.vy -= GRAVITY * dt;
        t.pivot.position.y += t.vy * dt;
        t.pivot.position.z -= 2.0 * dt;            // recede into depth
        t.pivot.position.x += t.drift * dt;

        // Fade out over the back half of the fall.
        t.mat.opacity = 1 - Math.max(0, (lifeFrac - 0.5) / 0.5);

        if (lifeFrac < 1) anyAlive = true;
      }

      if (!anyAlive) {
        phase = 'done';
        gridGroup.visible = false;   // hide spent geometry; desktop fully shown
        // Let clicks pass THROUGH the (now transparent) WebGL canvas to the
        // DOM desktop beneath, so clue.txt becomes interactive.
        canvas.style.pointerEvents = 'none';
      }
    }

    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);

  // =========================================================================
  // 7) DOM WIRING: clue.txt window + Replay button
  // =========================================================================
  const clueWindow = document.getElementById('clueWindow');
  document.getElementById('clueIcon').addEventListener('click', () => {
    clueWindow.style.display = 'block';
  });
  document.getElementById('clueClose').addEventListener('click', () => {
    clueWindow.style.display = 'none';
  });
  document.getElementById('replay').addEventListener('click', startSequence);

  // Kick it off.
  startSequence();
  </script>
</body>
</html>

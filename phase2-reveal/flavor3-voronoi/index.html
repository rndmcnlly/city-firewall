<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SECURE ACCESS — Voronoi Burst</title>
<style>
  /* ===== Classic Heist style guide ===== */
  :root {
    --bg:      #0a0e14;
    --panel:   #121822;
    --border:  #1d2735;
    --ink:     #e6edf3;
    --dim:     #8b98a5;
    --accent:  #ff4d4d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  /* ---- Stacking plan (all in the root stacking context) ----
       z 0 : #desktop  (the revealed secure desktop, behind the glass)
       z 3 : #stage    (the WebGL canvas holding the shattering glass)
       After the shatter finishes we add .revealed to <body>, which drops the
       canvas below the desktop and disables its pointer events so the desktop
       icons / clue window become clickable. The desktop deliberately does NOT
       set z-index:auto-with-a-value that traps its children: its interactive
       children (icon, window) use their own z-index in the root context. ---- */
  #stage {
    position: fixed; inset: 0; display: block;
    z-index: 3;
  }
  body.revealed #stage { z-index: -1; pointer-events: none; }

  #desktop {
    position: fixed; inset: 0;
    z-index: 0;
    background:
      radial-gradient(1200px 800px at 70% 20%, #14202e 0%, #0c121b 55%, #070a0f 100%);
    overflow: hidden;
  }
  #desktop .topbar {
    height: 34px;
    display: flex; align-items: center; gap: 14px;
    padding: 0 14px;
    background: rgba(18,24,34,0.85);
    border-bottom: 1px solid var(--border);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px; color: var(--dim);
  }
  #desktop .topbar .dot { width: 10px; height: 10px; border-radius: 50%; }
  #desktop .topbar .green  { background:#3fb950; }
  #desktop .topbar .spacer { flex: 1; }
  #desktop .topbar .secure { color: #3fb950; letter-spacing: 1px; }

  .desk-icon {
    position: absolute; left: 48px; top: 90px;
    width: 92px; text-align: center; cursor: pointer;
    user-select: none;
  }
  .desk-icon .glyph {
    width: 64px; height: 76px; margin: 0 auto 6px;
    background: linear-gradient(160deg, #1b2738, #0f1620);
    border: 1px solid var(--border);
    border-radius: 6px;
    position: relative;
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
  }
  .desk-icon .glyph::before { /* folded corner */
    content: ""; position: absolute; top: 0; right: 0;
    border-width: 0 16px 16px 0; border-style: solid;
    border-color: transparent var(--bg) transparent transparent;
  }
  .desk-icon .glyph::after { /* text lines */
    content: ""; position: absolute; left: 12px; right: 12px; top: 26px; height: 2px;
    background: var(--dim);
    box-shadow: 0 8px 0 var(--dim), 0 16px 0 var(--dim), 0 24px 0 var(--accent);
  }
  .desk-icon .label {
    font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: var(--ink);
    text-shadow: 0 1px 3px #000;
  }
  .desk-icon:hover .glyph { border-color: var(--accent); }

  /* clue.txt window */
  #clueWin {
    position: absolute; left: 50%; top: 46%; transform: translate(-50%,-50%) scale(0.96);
    width: 420px; max-width: 86vw;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.7);
    opacity: 0; pointer-events: none;
    transition: opacity .18s ease, transform .18s ease;
    z-index: 5;
  }
  #clueWin.open { opacity: 1; pointer-events: auto; transform: translate(-50%,-50%) scale(1); }
  #clueWin .bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    font-family: ui-monospace, Menlo, monospace; font-size: 13px; color: var(--dim);
  }
  #clueWin .bar .close {
    margin-left: auto; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: none;
  }
  #clueWin .body {
    padding: 26px 24px 30px; font-family: ui-monospace, Menlo, monospace;
  }
  #clueWin .body .code {
    font-size: 56px; letter-spacing: 14px; text-align: center;
    color: var(--accent); text-shadow: 0 0 22px rgba(255,77,77,0.55);
    margin: 6px 0 4px;
  }
  #clueWin .body .sub { text-align:center; color: var(--dim); font-size: 12px; }

  /* Replay button floats on top of everything */
  #replay {
    position: fixed; right: 18px; bottom: 18px; z-index: 10;
    font-family: ui-monospace, Menlo, monospace; font-size: 13px;
    color: var(--ink); background: var(--panel);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }
  #replay:hover { border-color: var(--accent); color: var(--accent); }

  /* Full-screen white flash overlay for the shockwave punch */
  #flash {
    position: fixed; inset: 0; z-index: 8; pointer-events: none;
    background: #ffffff; opacity: 0;
  }
</style>
</head>
<body>
  <!-- BEHIND: the revealed secure desktop -->
  <div id="desktop">
    <div class="topbar">
      <span class="dot green"></span>
      <span>root@firewall:~#</span>
      <span class="spacer"></span>
      <span class="secure">● SECURE LINK ESTABLISHED</span>
    </div>

    <div class="desk-icon" id="clueIcon" title="open clue.txt">
      <div class="glyph"></div>
      <div class="label">clue.txt</div>
    </div>

    <div id="clueWin">
      <div class="bar">
        <span>clue.txt</span>
        <button class="close" id="clueClose" title="close"></button>
      </div>
      <div class="body">
        <div class="code">WXYZ</div>
        <div class="sub">// decrypted fragment — feed to the master cipher</div>
      </div>
    </div>
  </div>

  <!-- IN FRONT: the WebGL stage that holds the shattering login glass -->
  <canvas id="stage"></canvas>
  <div id="flash"></div>
  <button id="replay">⟳ REPLAY</button>

  <!-- Pin a specific Three.js version from jsDelivr via an import map. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
  import * as THREE from "three";

  // ======================================================================
  //  VORONOI BURST  —  the most explosive flavor.
  //
  //  Pipeline:
  //    1. Draw the fake login UI onto a 2D <canvas> -> THREE.CanvasTexture.
  //    2. Scatter ~25-40 seed points, denser near the blast center.
  //    3. Build a Voronoi cell for each seed by clipping the screen rect
  //       against the perpendicular bisectors of nearby seeds
  //       (Sutherland-Hodgman half-plane clipping).
  //    4. Turn each convex cell into an extruded shard mesh, UV-mapped so
  //       the login texture is seamless before the burst.
  //    5. On shatter: a shockwave ring + white flash + camera shake, and
  //       every shard blasts radially outward from center with gravity and
  //       tumbling rotation, accelerating past the camera.
  // ======================================================================

  // ---- Layout constants. The login "glass" is a virtual plane of this size
  //      in world units; we keep its aspect close to the viewport. ----
  const PLANE_W = 16;
  const PLANE_H = 10;

  // -------------------------------------------------------------------
  // 1) DRAW THE LOGIN SCREEN ONTO A 2D CANVAS (this becomes the texture)
  // -------------------------------------------------------------------
  // Texture pixel resolution. High enough to look crisp, kept power-of-two-ish.
  const TEX_W = 1024;
  const TEX_H = Math.round(TEX_W * (PLANE_H / PLANE_W)); // keep texel aspect square
  const loginCanvas = document.createElement("canvas");
  loginCanvas.width = TEX_W;
  loginCanvas.height = TEX_H;
  const lctx = loginCanvas.getContext("2d");

  function drawLogin() {
    const w = TEX_W, h = TEX_H;
    // background
    lctx.fillStyle = "#0a0e14";
    lctx.fillRect(0, 0, w, h);

    // faint scanline / grid vibe
    lctx.strokeStyle = "rgba(29,39,53,0.5)";
    lctx.lineWidth = 1;
    for (let y = 0; y < h; y += 26) {
      lctx.beginPath(); lctx.moveTo(0, y); lctx.lineTo(w, y); lctx.stroke();
    }

    // centered login card
    const cardW = w * 0.46, cardH = h * 0.62;
    const cardX = (w - cardW) / 2, cardY = (h - cardH) / 2;
    roundRect(lctx, cardX, cardY, cardW, cardH, 18);
    lctx.fillStyle = "#121822";
    lctx.fill();
    lctx.lineWidth = 2;
    lctx.strokeStyle = "#1d2735";
    lctx.stroke();

    // title
    lctx.textAlign = "center";
    lctx.fillStyle = "#e6edf3";
    lctx.font = "600 " + Math.round(cardW * 0.085) + "px ui-sans-serif, system-ui, sans-serif";
    lctx.fillText("SECURE ACCESS", w / 2, cardY + cardH * 0.16);

    lctx.fillStyle = "#8b98a5";
    lctx.font = Math.round(cardW * 0.034) + "px ui-monospace, Menlo, monospace";
    lctx.fillText("authorized personnel only", w / 2, cardY + cardH * 0.225);

    // input fields
    const fieldW = cardW * 0.78, fieldH = cardH * 0.12;
    const fieldX = (w - fieldW) / 2;
    const labelFont = Math.round(cardW * 0.032) + "px ui-monospace, Menlo, monospace";
    drawField(cardY + cardH * 0.32, "USERNAME", "agent_brixton", labelFont, fieldX, fieldW, fieldH, w);
    drawField(cardY + cardH * 0.52, "PASSWORD", "••••••••••••", labelFont, fieldX, fieldW, fieldH, w);

    // ACCESS DENIED stamp (rotated)
    lctx.save();
    lctx.translate(w / 2, cardY + cardH * 0.80);
    lctx.rotate(-0.14);
    const stampW = cardW * 0.62, stampH = cardH * 0.16;
    roundRect(lctx, -stampW / 2, -stampH / 2, stampW, stampH, 8);
    lctx.lineWidth = 4;
    lctx.strokeStyle = "#ff4d4d";
    lctx.stroke();
    lctx.fillStyle = "#ff4d4d";
    lctx.font = "700 " + Math.round(stampH * 0.5) + "px ui-sans-serif, system-ui, sans-serif";
    lctx.textBaseline = "middle";
    lctx.fillText("ACCESS DENIED", 0, 2);
    lctx.restore();
    lctx.textBaseline = "alphabetic";
  }

  function drawField(y, label, value, labelFont, fieldX, fieldW, fieldH, w) {
    lctx.textAlign = "left";
    lctx.fillStyle = "#8b98a5";
    lctx.font = labelFont;
    lctx.fillText(label, fieldX, y - fieldH * 0.18);
    roundRect(lctx, fieldX, y, fieldW, fieldH, 8);
    lctx.fillStyle = "#0a0e14";
    lctx.fill();
    lctx.lineWidth = 1.5;
    lctx.strokeStyle = "#1d2735";
    lctx.stroke();
    lctx.fillStyle = "#e6edf3";
    lctx.font = Math.round(fieldH * 0.42) + "px ui-monospace, Menlo, monospace";
    lctx.fillText(value, fieldX + fieldW * 0.04, y + fieldH * 0.62);
    lctx.textAlign = "center";
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  drawLogin();
  const loginTexture = new THREE.CanvasTexture(loginCanvas);
  loginTexture.colorSpace = THREE.SRGBColorSpace;
  loginTexture.anisotropy = 4;

  // -------------------------------------------------------------------
  // 2) SEED POINTS — denser near center so the break radiates from a blast.
  // -------------------------------------------------------------------
  // We work in PLANE space: x in [-PLANE_W/2, +PLANE_W/2], y in [-PLANE_H/2,+PLANE_H/2].
  const HALF_W = PLANE_W / 2, HALF_H = PLANE_H / 2;

  function makeSeeds(count) {
    const seeds = [];
    // Always include a couple of seeds very close to the center for a tight core.
    for (let i = 0; i < count; i++) {
      // Radial bias: r = R * t^1.7 packs more points toward the center.
      const t = Math.random();
      const r = Math.pow(t, 1.7);                 // 0 (center) .. 1 (edge)
      const ang = Math.random() * Math.PI * 2;
      // Scale radius to roughly cover the plane diagonal.
      const maxR = Math.hypot(HALF_W, HALF_H) * 1.05;
      let x = Math.cos(ang) * r * maxR;
      let y = Math.sin(ang) * r * maxR * (HALF_H / HALF_W) * 1.3;
      // Clamp inside the plane (cells clip to the rect anyway, but keep tidy).
      x = Math.max(-HALF_W * 0.99, Math.min(HALF_W * 0.99, x));
      y = Math.max(-HALF_H * 0.99, Math.min(HALF_H * 0.99, y));
      seeds.push(new THREE.Vector2(x, y));
    }
    // Nudge any exact duplicates apart so bisectors are well-defined.
    for (let i = 0; i < seeds.length; i++) {
      for (let j = i + 1; j < seeds.length; j++) {
        if (seeds[i].distanceToSquared(seeds[j]) < 1e-4) {
          seeds[j].x += (Math.random() - 0.5) * 0.05;
          seeds[j].y += (Math.random() - 0.5) * 0.05;
        }
      }
    }
    return seeds;
  }

  // -------------------------------------------------------------------
  // 3) VORONOI via Sutherland-Hodgman half-plane clipping.
  //
  //    For seed S, its Voronoi cell = set of points closer to S than to any
  //    other seed T. The boundary with T is the perpendicular bisector of S,T.
  //    "Closer to S" is one half-plane. So we start with the full rectangle and
  //    intersect (clip) it with the half-plane for every other seed.
  //
  //    Half-plane test for "keep side of S": a point P is kept iff
  //        dot(P - M, S - T) >= 0
  //    where M = midpoint(S,T) and (S - T) is the inward normal toward S.
  // -------------------------------------------------------------------

  // Clip a convex polygon (array of Vector2, CCW or CW both fine) against one
  // half-plane defined by a point `pt` on the line and inward normal `n`.
  // Keeps the side where dot(P - pt, n) >= 0.
  function clipHalfPlane(poly, pt, n) {
    if (poly.length === 0) return poly;
    const out = [];
    const inside = (p) => (p.x - pt.x) * n.x + (p.y - pt.y) * n.y >= 0;
    for (let i = 0; i < poly.length; i++) {
      const cur = poly[i];
      const prev = poly[(i + poly.length - 1) % poly.length];
      const curIn = inside(cur);
      const prevIn = inside(prev);
      if (curIn) {
        if (!prevIn) out.push(intersect(prev, cur, pt, n));
        out.push(cur.clone());
      } else if (prevIn) {
        out.push(intersect(prev, cur, pt, n));
      }
    }
    return out;
  }

  // Intersection of segment a->b with the line through `pt` with normal `n`.
  function intersect(a, b, pt, n) {
    const da = (a.x - pt.x) * n.x + (a.y - pt.y) * n.y;
    const db = (b.x - pt.x) * n.x + (b.y - pt.y) * n.y;
    const denom = da - db;
    // Guard against parallel/degenerate (denom ~ 0): fall back to midpoint.
    const tt = Math.abs(denom) < 1e-9 ? 0.5 : da / denom;
    return new THREE.Vector2(
      a.x + (b.x - a.x) * tt,
      a.y + (b.y - a.y) * tt
    );
  }

  function polygonArea(poly) {
    let area = 0;
    for (let i = 0; i < poly.length; i++) {
      const a = poly[i], b = poly[(i + 1) % poly.length];
      area += a.x * b.y - b.x * a.y;
    }
    return Math.abs(area) / 2;
  }

  // Build one Voronoi cell polygon for seed index `si`.
  function voronoiCell(seeds, si) {
    const S = seeds[si];
    // Start with the full plane rectangle (CCW).
    let poly = [
      new THREE.Vector2(-HALF_W, -HALF_H),
      new THREE.Vector2( HALF_W, -HALF_H),
      new THREE.Vector2( HALF_W,  HALF_H),
      new THREE.Vector2(-HALF_W,  HALF_H),
    ];
    for (let ti = 0; ti < seeds.length; ti++) {
      if (ti === si) continue;
      const T = seeds[ti];
      const mid = new THREE.Vector2((S.x + T.x) / 2, (S.y + T.y) / 2);
      const n = new THREE.Vector2(S.x - T.x, S.y - T.y); // inward normal toward S
      poly = clipHalfPlane(poly, mid, n);
      if (poly.length < 3) return null; // clipped to nothing
    }
    if (poly.length < 3) return null;
    if (polygonArea(poly) < 1e-4) return null; // reject degenerate slivers
    return poly;
  }

  // -------------------------------------------------------------------
  // 4) MESHES — each cell becomes one extruded shard with correct UVs.
  // -------------------------------------------------------------------
  const SHARD_DEPTH = 0.28; // world-unit thickness, gives 3D edge/lighting

  // Map a plane-space point to UV in [0,1]. Texture is drawn top-left origin,
  // so V is flipped: plane +Y is up, but image +Y is down.
  function uvFor(p) {
    return new THREE.Vector2(
      (p.x + HALF_W) / PLANE_W,
      (p.y + HALF_H) / PLANE_H   // Three.js samples with (0,0) bottom-left, matches +Y up
    );
  }

  // Build an extruded prism geometry from a convex polygon (front face textured).
  function buildShardGeometry(poly, centroid) {
    // Recenter the polygon around its centroid so each shard can rotate about
    // its own center; we store the centroid offset to place it back in the world.
    const local = poly.map(p => new THREE.Vector2(p.x - centroid.x, p.y - centroid.y));
    const n = local.length;

    const positions = [];
    const uvs = [];
    const normals = [];
    const indices = [];
    const hz = SHARD_DEPTH / 2;

    // ---- FRONT face (z = +hz), textured, faces camera (+Z) ----
    const frontStart = 0;
    for (let i = 0; i < n; i++) {
      positions.push(local[i].x, local[i].y, hz);
      const uv = uvFor(poly[i]);
      uvs.push(uv.x, uv.y);
      normals.push(0, 0, 1);
    }
    // fan triangulation (convex polygon -> safe)
    for (let i = 1; i < n - 1; i++) {
      indices.push(frontStart, frontStart + i, frontStart + i + 1);
    }

    // ---- BACK face (z = -hz), faces -Z ----
    const backStart = positions.length / 3;
    for (let i = 0; i < n; i++) {
      positions.push(local[i].x, local[i].y, -hz);
      uvs.push(0, 0); // back is unlit/untextured visually; UV unused
      normals.push(0, 0, -1);
    }
    for (let i = 1; i < n - 1; i++) {
      // reverse winding for back-facing
      indices.push(backStart, backStart + i + 1, backStart + i);
    }

    // ---- SIDE walls (the broken-glass edges that catch light) ----
    for (let i = 0; i < n; i++) {
      const a = local[i];
      const b = local[(i + 1) % n];
      // outward edge normal (approx)
      const ex = b.x - a.x, ey = b.y - a.y;
      const len = Math.hypot(ex, ey) || 1;
      const nx = ey / len, ny = -ex / len;
      const base = positions.length / 3;
      // quad: a(front), b(front), b(back), a(back)
      positions.push(a.x, a.y,  hz);  normals.push(nx, ny, 0); uvs.push(0, 0);
      positions.push(b.x, b.y,  hz);  normals.push(nx, ny, 0); uvs.push(0, 0);
      positions.push(b.x, b.y, -hz);  normals.push(nx, ny, 0); uvs.push(0, 0);
      positions.push(a.x, a.y, -hz);  normals.push(nx, ny, 0); uvs.push(0, 0);
      indices.push(base, base + 1, base + 2);
      indices.push(base, base + 2, base + 3);
    }

    const geom = new THREE.BufferGeometry();
    geom.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
    geom.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
    geom.setAttribute("normal", new THREE.Float32BufferAttribute(normals, 3));
    geom.setIndex(indices);
    return geom;
  }

  function polygonCentroid(poly) {
    // Area-weighted centroid for accurate spin center.
    let a = 0, cx = 0, cy = 0;
    for (let i = 0; i < poly.length; i++) {
      const p = poly[i], q = poly[(i + 1) % poly.length];
      const cross = p.x * q.y - q.x * p.y;
      a += cross;
      cx += (p.x + q.x) * cross;
      cy += (p.y + q.y) * cross;
    }
    a *= 0.5;
    if (Math.abs(a) < 1e-9) {
      // fallback: vertex average
      let sx = 0, sy = 0;
      for (const p of poly) { sx += p.x; sy += p.y; }
      return new THREE.Vector2(sx / poly.length, sy / poly.length);
    }
    return new THREE.Vector2(cx / (6 * a), cy / (6 * a));
  }

  // -------------------------------------------------------------------
  //  THREE.JS SCENE SETUP
  // -------------------------------------------------------------------
  const canvas = document.getElementById("stage");
  const renderer = new THREE.WebGLRenderer({
    canvas, antialias: true, alpha: true // alpha so the desktop shows through
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  // The intact camera distance is recomputed in resize() so the glass plane
  // exactly fills the viewport (cover-fit). `camZ` is the single source of truth.
  let camZ = 14;
  camera.position.set(0, 0, camZ);
  camera.lookAt(0, 0, 0);

  // Lighting: a key light off to the side makes the shard edges/walls pop.
  scene.add(new THREE.AmbientLight(0xffffff, 0.9));
  const key = new THREE.DirectionalLight(0xffffff, 1.2);
  key.position.set(-6, 8, 10);
  scene.add(key);
  const rim = new THREE.DirectionalLight(0xff4d4d, 0.35); // subtle red rim = heist accent
  rim.position.set(8, -4, 6);
  scene.add(rim);

  // Material: textured front, lit. Back/sides read as dark glass.
  // MeshStandardMaterial gives us proper response to the lights on the walls.
  const shardMaterial = new THREE.MeshStandardMaterial({
    map: loginTexture,
    metalness: 0.15,
    roughness: 0.55,
    side: THREE.FrontSide,
  });

  // Group holds all shards so we can clear/rebuild on replay.
  const shardGroup = new THREE.Group();
  scene.add(shardGroup);

  // Shockwave ring: a flat ring mesh that expands and fades on the blast.
  const ringGeo = new THREE.RingGeometry(0.2, 0.5, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff4d4d, transparent: true, opacity: 0, side: THREE.DoubleSide,
    depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.set(0, 0, 1.5); // slightly in front of the glass plane
  scene.add(ring);

  // Per-shard physics state.
  let shards = []; // { mesh, vel:Vector3, angVel:Vector3, home:Vector3 }

  function clearShards() {
    for (const s of shards) {
      shardGroup.remove(s.mesh);
      s.mesh.geometry.dispose();
    }
    shards = [];
  }

  function buildShards() {
    clearShards();
    const count = 25 + Math.floor(Math.random() * 16); // 25..40 seeds
    const seeds = makeSeeds(count);

    for (let si = 0; si < seeds.length; si++) {
      const poly = voronoiCell(seeds, si);
      if (!poly) continue; // skip degenerate cells -> robust, never crashes

      const centroid = polygonCentroid(poly);
      const geom = buildShardGeometry(poly, centroid);
      const mesh = new THREE.Mesh(geom, shardMaterial);
      // Place the shard so its centroid sits at the cell's world position.
      mesh.position.set(centroid.x, centroid.y, 0);
      shardGroup.add(mesh);

      // ---- Shockwave velocity: radial blast from center (0,0). ----
      const dir = new THREE.Vector3(centroid.x, centroid.y, 0);
      const dist = Math.max(dir.length(), 0.001);
      dir.normalize();
      // Central shards get the biggest punch (inverse-ish with distance),
      // and everything gets a strong +Z kick toward/past the camera.
      const blast = 9.0 + (6.0 / (0.6 + dist)); // stronger near center
      const vel = new THREE.Vector3(
        dir.x * blast,
        dir.y * blast,
        6.0 + Math.random() * 5.0     // toward camera (+Z)
      );
      // a little randomness so it doesn't look mechanical
      vel.x += (Math.random() - 0.5) * 2.5;
      vel.y += (Math.random() - 0.5) * 2.5;

      // ---- Tumbling rotation ----
      const angVel = new THREE.Vector3(
        (Math.random() - 0.5) * 8,
        (Math.random() - 0.5) * 8,
        (Math.random() - 0.5) * 8
      );

      shards.push({ mesh, vel, angVel });
    }
  }

  // -------------------------------------------------------------------
  //  ANIMATION / STATE MACHINE
  // -------------------------------------------------------------------
  const GRAVITY = -11.0;   // world units / s^2, pulls shards down
  const STATE = { INTACT: "intact", SHATTERED: "shattered" };
  let state = STATE.INTACT;
  let elapsed = 0;          // seconds in current state
  let autoFired = false;    // did the auto-trigger happen yet
  const flashEl = document.getElementById("flash");

  function resetToIntact() {
    buildShards();
    // Snap every shard back to its home (z=0, no rotation) -> a seamless plane.
    for (const s of shards) {
      s.mesh.rotation.set(0, 0, 0);
      // home position already set in buildShards (centroid)
      s.mesh.position.z = 0;
      s.mesh.visible = true;
    }
    ringMat.opacity = 0;
    flashEl.style.opacity = 0;
    camera.position.set(0, 0, camZ);
    document.body.classList.remove("revealed"); // glass is back; canvas on top
    state = STATE.INTACT;
    elapsed = 0;
    autoFired = false;
  }

  function shatter() {
    if (state === STATE.SHATTERED) return;
    state = STATE.SHATTERED;
    elapsed = 0;
    // Punch: ring + flash kick off at t=0.
    ringMat.opacity = 0.9;
    ring.scale.set(1, 1, 1);
    flashEl.style.transition = "none";
    flashEl.style.opacity = "0.85";
    // fade flash out fast
    requestAnimationFrame(() => {
      flashEl.style.transition = "opacity 0.32s ease-out";
      flashEl.style.opacity = "0";
    });
  }

  // Camera shake helper: strong but brief, decays over ~0.5s.
  function applyShake(t) {
    const SHAKE_DUR = 0.5;
    if (t > SHAKE_DUR) { camera.position.x = 0; camera.position.y = 0; camera.position.z = camZ; return; }
    const k = (1 - t / SHAKE_DUR);      // linear decay
    const amp = 0.6 * k * k;            // ease-out the amplitude
    camera.position.x = (Math.random() - 0.5) * amp;
    camera.position.y = (Math.random() - 0.5) * amp;
    camera.position.z = camZ + (Math.random() - 0.5) * amp * 0.5;
  }

  let lastT = performance.now();
  function tick(now) {
    const dt = Math.min((now - lastT) / 1000, 0.05); // clamp big frame gaps
    lastT = now;
    elapsed += dt;

    if (state === STATE.INTACT) {
      // Auto-fire the shatter after ~1.2s (per shared spec).
      if (!autoFired && elapsed > 1.2) { autoFired = true; shatter(); }
    } else {
      // SHATTERED: integrate physics for each shard.
      for (const s of shards) {
        // velocity Verlet-ish (simple Euler is fine at 60fps for a demo)
        s.vel.y += GRAVITY * dt;
        s.mesh.position.x += s.vel.x * dt;
        s.mesh.position.y += s.vel.y * dt;
        s.mesh.position.z += s.vel.z * dt;
        s.mesh.rotation.x += s.angVel.x * dt;
        s.mesh.rotation.y += s.angVel.y * dt;
        s.mesh.rotation.z += s.angVel.z * dt;
        // Cull shards that have flown well past the camera to save fill rate.
        if (s.mesh.position.z > camZ + 4) s.mesh.visible = false;
      }

      // Shockwave ring expands and fades.
      if (ringMat.opacity > 0) {
        const grow = 1 + elapsed * 26;
        ring.scale.set(grow, grow, 1);
        ringMat.opacity = Math.max(0, 0.9 - elapsed * 2.4);
      }

      applyShake(elapsed);

      // Once the shards have blasted away (~1.6s), hand the screen to the
      // desktop: drop the canvas behind it and make the icons clickable.
      if (elapsed > 1.6 && !document.body.classList.contains("revealed")) {
        document.body.classList.add("revealed");
      }
    }

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }

  // -------------------------------------------------------------------
  //  RESIZE — keep the plane filling the viewport without distortion.
  // -------------------------------------------------------------------
  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    // Fit the PLANE_W x PLANE_H glass to fill the viewport at z=0.
    // Compute the camera distance so the plane covers the frustum (cover, not contain).
    const vFov = THREE.MathUtils.degToRad(camera.fov);
    // visible height at z=0 for current cam distance:
    // we instead adjust camera.z so plane fully covers.
    const distForHeight = (PLANE_H / 2) / Math.tan(vFov / 2);
    const distForWidth  = (PLANE_W / 2) / (Math.tan(vFov / 2) * camera.aspect);
    const needed = Math.max(distForHeight, distForWidth) * 1.02; // tiny margin
    camZ = needed; // single source of truth for the intact camera distance
    // Only snap the camera now when intact (don't fight the shake / fly-through).
    if (state === STATE.INTACT) {
      camera.position.z = camZ;
    }
  }

  // -------------------------------------------------------------------
  //  WIRING
  // -------------------------------------------------------------------
  window.addEventListener("resize", resize);

  // Click anywhere on the canvas before auto-fire to trigger early.
  canvas.addEventListener("pointerdown", () => {
    if (state === STATE.INTACT) shatter();
  });

  // Replay button: rebuild a fresh Voronoi pattern and reset.
  document.getElementById("replay").addEventListener("click", () => {
    resetToIntact();
    resize(); // re-fit camera
  });

  // clue.txt window open/close
  const clueWin = document.getElementById("clueWin");
  document.getElementById("clueIcon").addEventListener("click", () => clueWin.classList.add("open"));
  document.getElementById("clueClose").addEventListener("click", () => clueWin.classList.remove("open"));

  // -------------------------------------------------------------------
  //  BOOT
  // -------------------------------------------------------------------
  resetToIntact();
  resize();
  lastT = performance.now();
  requestAnimationFrame(tick);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Spies // Typing Frenzy (Beat 3)</title>
<style>
  :root {
    --bg: #05070a;
    --fg: #d7e6df;
    --dim: #5f7d72;
    --hacker: #8affc1;   /* what the hacker types */
    --prompt: #4fd1ff;   /* the shell prompt */
    --ok: #6dff9e;       /* success output */
    --err: #ff5b6e;      /* error output */
    --warn: #ffd166;     /* warnings */
    --sys: #7fa99b;      /* ordinary system output */
    --accent: #ff3b4e;   /* heist red */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    overflow: hidden;
  }
  #scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: repeating-linear-gradient(
      to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px);
    mix-blend-mode: multiply;
  }
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 4;
    box-shadow: inset 0 0 220px 40px rgba(0,0,0,0.85);
  }
  #term {
    position: absolute; inset: 0;
    padding: 28px 34px 150px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 15px;
    line-height: 1.5;
    text-shadow: 0 0 6px rgba(138,255,193,0.12);
    z-index: 2;
  }
  #term::-webkit-scrollbar { width: 0; height: 0; }
  .prompt  { color: var(--prompt); }
  .hacker  { color: var(--hacker); }
  .sys     { color: var(--sys); }
  .ok      { color: var(--ok); font-weight: 600; }
  .err     { color: var(--err); font-weight: 600; }
  .warn    { color: var(--warn); }
  .banner  { color: var(--accent); font-weight: 700; text-shadow: 0 0 10px rgba(255,59,78,0.5); }
  .dim     { color: var(--dim); }
  #cursor {
    display: inline-block; width: 9px; height: 1.05em;
    background: var(--hacker); vertical-align: text-bottom;
    box-shadow: 0 0 8px var(--hacker);
    animation: blink 1s steps(1) infinite;
  }
  #cursor.idle-output { background: var(--dim); box-shadow: none; opacity: 0.4; }
  @keyframes blink { 50% { opacity: 0; } }

  #hud {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 6;
    display: flex; align-items: center; gap: 26px;
    padding: 22px 32px;
    background: linear-gradient(to top, rgba(5,7,10,0.99) 55%, rgba(5,7,10,0.85) 85%, rgba(5,7,10,0));
    border-top: 3px solid var(--accent);
    box-shadow: 0 -18px 50px 0 rgba(255,59,78,0.28), inset 0 1px 0 rgba(255,59,78,0.4);
    font-size: 20px; color: var(--fg);
  }
  #hint {
    flex: 1;
    color: var(--warn);
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 0 0 16px rgba(255,209,102,0.6);
    animation: pulse 1.1s ease-in-out infinite;
  }
  #hint .ok  { font-size: 30px; }
  #hint .dim { font-size: 26px; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  #progressWrap {
    width: 220px; height: 16px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,59,78,0.4);
    border-radius: 8px; overflow: hidden;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
  }
  #progress { height: 100%; width: 0; background: var(--accent); box-shadow: 0 0 14px var(--accent); transition: width 0.2s; }
  select, button {
    background: #0c1118; color: var(--fg); border: 1px solid #1d2935;
    font-family: inherit; font-size: 16px; padding: 8px 12px; border-radius: 6px; cursor: pointer;
  }
  #stage {
    color: #fff; background: var(--accent);
    font-weight: 800; font-size: 24px; letter-spacing: 2px;
    min-width: 150px; text-align: center;
    padding: 8px 14px; border-radius: 6px;
    box-shadow: 0 0 20px rgba(255,59,78,0.6);
  }
  .enter-key {
    display: inline-block;
    border: 2px solid var(--warn); border-radius: 6px;
    padding: 2px 14px; margin: 0 4px; color: #1a1300; background: var(--warn);
    font-weight: 900; box-shadow: 0 0 16px rgba(255,209,102,0.7);
  }
</style>

<body>

  \\____|___| |_|   |_|   |____/|_|   |_|\\_\\    |_|   |_|  (o)

            >>> AGENT, YOU CRACKED CVE-2026-48710 <<<` },

/* ============================================================================
   THE ENGINE
   - Walks SCRIPT segment by segment.
   - 'prompt' + 'out' are non-interactive: printed/streamed on a timer.
   - 'input' is keystroke-driven: each keypress reveals CHARS_PER_KEY characters
     of the command. When fully revealed, the kid presses Enter to submit.
   - "Accelerating build": CHARS_PER_KEY ramps up across the 6 stages so the
     finale feels frantic.
   - Speed presets scale both the per-key reveal and the output stream rate so
     total runtime can be dialed to a time target.
   ========================================================================== */

const SPEED = {
  // outMs   = ms per output character while streaming system responses
  // keyBase = characters revealed per keypress at the first stage
  // keyRamp = extra chars-per-key added per stage index (acceleration)
  slow:      { outMs: 5.0, keyBase: 1, keyRamp: 0.5 },
  normal:    { outMs: 2.4, keyBase: 2, keyRamp: 1.0 },
  fast:      { outMs: 1.1, keyBase: 4, keyRamp: 1.5 },
  ludicrous: { outMs: 0.4, keyBase: 7, keyRamp: 2.5 },
};

const termEl = document.getElementById('term');
const cursorEl = document.getElementById('cursor');
const stageEl = document.getElementById('stage');
const hintEl = document.getElementById('hint');
const progressEl = document.getElementById('progress');
const speedSel = document.getElementById('speed');
const replayBtn = document.getElementById('replay');

// stage order for acceleration ramp
const STAGES = ['RECON','ENUMERATE','BREACH','EXPLOIT','PRIVESC','EXFIL'];

let state = null;

function makeState() {
  return {
    idx: 0,            // current segment index
    mode: 'idle',      // 'idle' | 'await-keys' | 'await-enter' | 'streaming' | 'done'
    typed: 0,          // chars of current input revealed
    finished: false,
  };
}

function cfg() { return SPEED[speedSel.value] || SPEED.normal; }

function appendSpan(text, cls) {
  const s = document.createElement('span');
  if (cls) s.className = cls;
  s.textContent = text;
  termEl.insertBefore(s, cursorEl);
  return s;
}

function newline() { termEl.insertBefore(document.createTextNode('\n'), cursorEl); }

function scrollToCursor() { termEl.scrollTop = termEl.scrollHeight; }

function setStage(name) {
  stageEl.textContent = name;
  const i = STAGES.indexOf(name);
  progressEl.style.width = (((i + 1) / STAGES.length) * 100) + '%';
}

function charsPerKey() {
  const seg = SCRIPT[state.idx];
  const si = seg && seg.stage ? STAGES.indexOf(seg.stage) : 0;
  const c = cfg();
  return Math.max(1, Math.round(c.keyBase + c.keyRamp * Math.max(0, si)));
}

// Drive the engine to the next non-interactive thing it can do on its own.
function advance() {
  while (state.idx < SCRIPT.length) {
    const seg = SCRIPT[state.idx];
    if (seg.t === 'prompt') {
      appendSpan(seg.text, 'prompt');
      state.idx++;
      continue;
    }
    if (seg.t === 'input') {
      if (seg.stage) setStage(seg.stage);
      // wait for keystrokes
      state.mode = 'await-keys';
      state.typed = 0;
      state.inputSpan = appendSpan('', 'hacker');
      cursorEl.classList.remove('idle-output');
      hintEl.innerHTML = '[ MASH ANY KEYS ]';
      scrollToCursor();
      return;
    }
    if (seg.t === 'out') {
      streamOutput(seg);
      return;
    }
    if (seg.t === 'done') {
      finish();
      return;
    }
    state.idx++;
  }
}

function streamOutput(seg) {
  state.mode = 'streaming';
  cursorEl.classList.add('idle-output');
  hintEl.innerHTML = '<span class="dim">...incoming...</span>';
  const span = appendSpan('', seg.cls || 'sys');
  const text = seg.text;
  let i = 0;
  const step = Math.max(1, Math.round(1 / Math.max(0.05, cfg().outMs / 4)));
  const tick = () => {
    if (state.mode !== 'streaming') return; // aborted by replay
    i = Math.min(text.length, i + step);
    span.textContent = text.slice(0, i);
    scrollToCursor();
    if (i >= text.length) {
      newline();
      state.idx++;
      advance();
    } else {
      setTimeout(tick, cfg().outMs * step);
    }
  };
  tick();
}

function onKey(e) {
  if (!state || state.mode !== 'await-keys') {
    // allow Enter to submit a fully-typed command
    if (state && state.mode === 'await-enter' && (e.key === 'Enter' || e.key === ' ')) {
      e.preventDefault();
      submitInput();
    }
    return;
  }
  // ignore modifier-only presses
  if (e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' || e.key === 'Meta') return;
  e.preventDefault();
  const seg = SCRIPT[state.idx];
  state.typed = Math.min(seg.text.length, state.typed + charsPerKey());
  state.inputSpan.textContent = seg.text.slice(0, state.typed);
  scrollToCursor();
  if (state.typed >= seg.text.length) {
    state.mode = 'await-enter';
    hintEl.innerHTML = 'command ready &mdash; press <span class="enter-key">ENTER</span>';
  }
}

function submitInput() {
  newline();
  state.idx++;
  hintEl.innerHTML = '<span class="dim">...incoming...</span>';
  advance();
}

function finish() {
  state.mode = 'done';
  state.finished = true;
  cursorEl.style.display = 'none';
  stageEl.textContent = 'DONE';
  progressEl.style.width = '100%';
  hintEl.innerHTML = '<span class="ok">FIREWALL DEFEATED &mdash; standby for breach...</span>';
  scrollToCursor();
  // In the full sequence this is where we hand off to Beat 4 (the shatter).
  document.dispatchEvent(new CustomEvent('typing-frenzy-complete'));
}

function reset() {
  // clear everything except the cursor
  [...termEl.childNodes].forEach(n => { if (n !== cursorEl) termEl.removeChild(n); });
  cursorEl.style.display = '';
  cursorEl.classList.remove('idle-output');
  state = makeState();
  setStage('RECON');
  stageEl.textContent = 'STANDBY';
  advance();
}

window.addEventListener('keydown', onKey);
replayBtn.addEventListener('click', reset);
speedSel.addEventListener('change', () => {/* applies on next tick automatically */});

reset();
</script>
</body>
</html>
